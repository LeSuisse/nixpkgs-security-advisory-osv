name: Synchronize advisories
on:
  schedule:
    - cron: "0 */5 * * *"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  sync-advisories:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: true
      - name: Setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Run advisories sync
        run: npm run transform_advisories
      - name: Commit changed advisories if needed
        run: |-
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add -A
          git commit -m "Synchronize advisories $(date --rfc-3339=seconds)" || exit 0
          git push
